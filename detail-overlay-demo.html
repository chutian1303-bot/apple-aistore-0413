<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Apple 详情浮层示意</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .wrap { width: 100%; min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .phone { width: min(420px, 100%); border-radius: 28px; overflow: hidden; background: #fff; border: 1px solid #e5e5ea; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08); }
    .head { padding: 14px 16px; border-bottom: 1px solid #f0f0f2; font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; }
    .feed { padding: 14px 16px; display: grid; gap: 10px; background: #fafafa; }
    .item { background: #fff; border: 1px solid #ececf0; border-radius: 14px; padding: 10px; display: grid; gap: 4px; }
    .item b { font-size: 14px; }
    .item span { font-size: 12px; color: #6e6e73; }
    .overlay { border-top: 1px solid #ececf0; padding: 16px; display: grid; gap: 10px; background: #fff; }
    .title { font-size: 16px; font-weight: 700; }
    .meta { font-size: 12px; color: #6e6e73; }
    .box { background: #f5f5f7; border-radius: 12px; padding: 10px; font-size: 13px; line-height: 1.55; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { border: 1px solid #d2d2d7; border-radius: 999px; padding: 5px 10px; font-size: 12px; color: #424245; background: #fff; }
    .price { display: flex; align-items: center; justify-content: space-between; }
    .price strong { font-size: 20px; }
    .btn { border: 0; border-radius: 999px; padding: 10px 14px; font-size: 13px; font-weight: 600; color: #fff; background: #0071e3; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="phone">
      <header class="head">
        <span>Apple 官方在线商店</span>
        <span>详情浮层示意</span>
      </header>
      <div class="feed">
        <article class="item">
          <b>Apple iPhone 15 Pro 256GB</b>
          <span>原色钛金属 · A17 Pro</span>
        </article>
        <article class="item">
          <b>Apple MacBook Air 13 英寸 M3</b>
          <span>16GB + 512GB · 轻薄高性能</span>
        </article>
      </div>
      <div class="overlay">
        <div class="title">Apple iPhone 15 Pro 256GB</div>
        <div class="meta">Apple 官方正品 · 全国联保 · 支持教育优惠</div>
        <div class="box">建议优先选择 256GB 版本，兼顾拍摄、视频缓存与长期使用成本。若重度视频创作可升级到 512GB。</div>
        <div class="chips">
          <span class="chip">配置建议</span>
          <span class="chip">机型对比</span>
          <span class="chip">配件组合</span>
          <span class="chip">优惠方案</span>
        </div>
        <div class="price">
          <strong>¥8,999</strong>
          <button class="btn" type="button">立即咨询</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
