<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>JNBY AI 店铺 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="demo-shell">
    <div class="phone" id="phoneApp">
      <div class="sbar-collapsible" id="sbar">
        <span id="statusTime">10:32</span>
        <span>5G ▌▌</span>
      </div>

      <div class="compact-s1" id="compactBar">
        <div class="cb-logo">JNBY</div>
        <div class="cb-text">
          <div class="cb-name">JNBY 江南布衣旗舰店</div>
          <div class="cb-sub">anna 已为你整理好了 28 款新品</div>
        </div>
      </div>

      <div class="bbar-collapsible" id="bbar">
        <div class="bbar-inner">
          <div class="logo">JNBY</div>
          <div class="btext">
            <div class="brow1">
              <span class="bname">JNBY 江南布衣旗舰店</span>
              <span class="bdot">·</span>
              <span class="bmeta">⭐4.8</span>
              <span class="bdot">·</span>
              <span class="bmeta">62.3万粉丝</span>
            </div>
            <div class="brow2">
              <span class="btag hi">官方旗舰店</span>
              <span class="btag">品牌设计师</span>
              <span class="btag">白领精选</span>
            </div>
          </div>
        </div>
      </div>

      <div class="reply-sub" id="replySub"></div>

      <div class="content-host">
        <div class="scroll-s1" id="homeScroll">
          <div class="anna-zone" id="annaZone">
            <div class="anna-text" id="welcomeText">
              hi 王同学，欢迎进店，我是你的专属店铺导购 anna。本店最近上新了 <span class="hi">28 款新品</span>，结合你平时的穿衣风格，已经为你整理好了。
            </div>
          </div>
          <div class="feed-grid" id="feedGrid"></div>
        </div>

        <div class="canvas hidden" id="canvas"></div>
      </div>

      <div class="scrim hidden" id="scrim"></div>
      <section class="overlay hidden" id="detailOverlay" aria-hidden="true">
        <div class="ov-top">
          <button class="ov-back" id="detailCloseBtn" type="button">←</button>
          <div class="ov-handle"></div>
          <div style="width:22px"></div>
        </div>
        <div class="ov-scroll" id="detailScroll">
          <div class="prod-img">
            <img id="detailImage" alt="商品图">
            <div class="img-dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div></div>
            <button class="tryon-btn" id="detailTryBtn" type="button">✦ AI 试衣</button>
          </div>

          <div class="ov-body">
            <div class="prod-name" id="detailName"></div>
            <div class="prod-meta" id="detailMeta"></div>

            <div class="anna-card">
              <div class="ac-h">
                <div class="ac-ava">A</div>
                <span class="ac-nm">anna 说</span>
                <span class="ac-lb">专属推荐</span>
              </div>
              <div class="ac-rec" id="detailInsight"></div>
            </div>

            <div class="sec-t">尺码推荐</div>
            <div class="size-row">
              <div class="sz">XS</div>
              <div class="sz rec">S</div>
              <div class="sz">M</div>
              <div class="sz">L</div>
            </div>
            <div class="size-note">根据历史购买记录，建议选 S 码；如果想要更松弛可试 M 码。</div>

            <div class="sec-t">搭配建议</div>
            <div class="outfit-row" id="outfitRow"></div>
          </div>
        </div>

        <div class="buy-bar">
          <div class="buy-price">
            <span class="buy-price-main" id="buyPriceMain">¥0</span>
            <div class="buy-price-sub">
              <span class="buy-price-old" id="buyPriceOld">¥0</span>
              <span class="buy-price-badge">店铺券</span>
            </div>
          </div>
          <div class="buy-bar-inner">
            <button class="buy-btn add" type="button">加入购物车</button>
            <button class="buy-btn now" type="button">立即购买</button>
          </div>
        </div>
      </section>

      <div class="panel-backdrop hidden" id="panelBackdrop"></div>
      <section class="panel-region hidden" id="panelRegion" aria-hidden="true">
        <div class="panel">
          <div class="panel-hdr">
            <span class="panel-title" id="panelTitle">商品足迹</span>
            <button class="panel-close" id="panelCloseBtn" type="button">收起</button>
          </div>
          <div class="panel-list" id="panelList"></div>
        </div>
      </section>

      <div class="bbot-collapsible" id="bottomBar">
        <div class="chips-row" id="chipsRow"></div>
        <div class="input-row">
          <input class="input-field" id="intentInput" type="text" autocomplete="off" placeholder="anna 在线，可以问我任何问题">
          <button class="send-btn" id="sendBtn" type="button" aria-label="发送">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
